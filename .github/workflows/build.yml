name: 'publish'

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

# This workflow will trigger on each push to a tag and can also be run manually.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      - name: Read changelog
        run: |
          $raw = Get-Content CHANGELOG.md -Raw
          $matches = [regex]::Matches($raw, "(?m)^## .+")
          if ($matches.Count -eq 0) {
            Write-Error "No changelog entries found."
            exit 1
          }

          $start = $matches[0].Index
          $end = if ($matches.Count -gt 1) { $matches[1].Index } else { $raw.Length }
          $latest = $raw.Substring($start, $end - $start).Trim()

          @(
            'RELEASE_BODY<<EOF'
            $latest
            'EOF'
          ) | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Determine release type
        id: release_type
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          # Check for semver pre-release (hyphen followed by anything)
          if ($tag -match 'v?\d+\.\d+\.\d+-.+') {
            echo "IS_PRERELEASE=true" >> $env:GITHUB_ENV
            Write-Host "Detected prerelease tag: $tag"
          } else {
            echo "IS_PRERELEASE=false" >> $env:GITHUB_ENV
            Write-Host "Detected stable release tag: $tag"
          }

      - name: Validate Tauri signing key
        if: ${{ env.IS_PRERELEASE != 'true' }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is missing or empty."
            exit 1
          }

          $firstLine = ($env:TAURI_SIGNING_PRIVATE_KEY -split "`n")[0].Trim()
          if ($firstLine -in @(
            '-----BEGIN PUBLIC KEY-----',
            '-----BEGIN CERTIFICATE-----',
            '-----BEGIN RSA PUBLIC KEY-----'
          )) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY appears to contain a public key or certificate, not a private key. Found: $firstLine"
            exit 1
          }

          if ($firstLine -notin @(
            '-----BEGIN PRIVATE KEY-----',
            '-----BEGIN RSA PRIVATE KEY-----'
          )) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY does not start with a recognized private key header. Found: $firstLine"
            exit 1
          }

          Write-Host "TAURI_SIGNING_PRIVATE_KEY is present and starts with a valid private key header."
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty."
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is present."
          }

      - name: Build prerelease
        if: ${{ env.IS_PRERELEASE == 'true' }}
        uses: tauri-apps/tauri-action@v0
        id: tauri_prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          includeDebug: false
          includeUpdaterJson: false
          releaseName: 'v__VERSION__'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      - name: Build stable release
        if: ${{ env.IS_PRERELEASE != 'true' }}
        uses: tauri-apps/tauri-action@v0
        id: tauri_release
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          includeDebug: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          releaseName: 'v__VERSION__'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Capture app version
        if: ${{ success() }}
        run: |
          $appVersion = if ($env:IS_PRERELEASE -eq 'true') {
            '${{ steps.tauri_prerelease.outputs.appVersion }}'
          } else {
            '${{ steps.tauri_release.outputs.appVersion }}'
          }

          if (-not $appVersion) {
            Write-Error "Could not determine app version from Tauri Action outputs."
            exit 1
          }

          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Force publish GitHub release
        if: ${{ success() }}
        uses: actions/github-script@v7
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          IS_PRERELEASE: ${{ env.IS_PRERELEASE }}
        with:
          script: |
            const refTag = process.env.GITHUB_REF?.replace('refs/tags/', '');
            const versionTag = process.env.APP_VERSION ? `v${process.env.APP_VERSION}` : undefined;

            // Try a few common tag shapes to match whatever was pushed
            const candidates = Array.from(new Set([
              refTag,
              versionTag,
              versionTag?.replace(/^v/, ''),
              refTag && !refTag.startsWith('v') ? `v${refTag}` : undefined,
              refTag?.startsWith('v') ? refTag.slice(1) : undefined,
            ].filter(Boolean)));

            if (candidates.length === 0) {
              core.warning('No tag detected, skipping publish step.');
              return;
            }

            let release;
            for (const tag of candidates) {
              try {
                const rel = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                release = { rel, tag };
                break;
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            if (!release) {
              core.warning(`Release not found for tags: ${candidates.join(', ')}`);
              return;
            }

            const { rel, tag } = release;
            if (rel.data.draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.data.id,
                draft: false,
                make_latest: process.env.IS_PRERELEASE === 'true' ? 'false' : 'true',
              });
              core.info(`Published release for ${tag}`);
            } else {
              core.info(`Release for ${tag} already published`);
            }

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-windows-release-v${{ env.APP_VERSION }}
          path: src-tauri/target/release/bundle/


      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-windows-debug-v${{ env.APP_VERSION }}
          path: src-tauri/target/debug/bundle/

      - name: Update updater.json
        if: ${{ env.IS_PRERELEASE == 'false' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          $defaultBranch = "${{ github.event.repository.default_branch }}"
          git fetch origin $defaultBranch
          git checkout $defaultBranch
          git pull origin $defaultBranch

          # Write release notes to a temporary file
          Set-Content -Path release_notes_temp.md -Value $env:RELEASE_BODY

          # Generate updater.json
          node scripts/generate_updater.js "${{ env.APP_VERSION }}" release_notes_temp.md src-tauri/target/release/bundle/ updater.json

          # Commit and push
          git add updater.json
          git commit -m "Update updater.json for version ${{ env.APP_VERSION }}" || echo "No changes to commit"
          git push origin $defaultBranch

      - name: Upload latest.json to release
        if: ${{ success() && env.IS_PRERELEASE == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copy updater.json latest.json
          gh release upload v${{ env.APP_VERSION }} latest.json --clobber
